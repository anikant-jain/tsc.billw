function saveState() {

// ===================== UTILS =====================
function fmtTime(secs) {
  if (!secs) return '00:00:00';
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function nowStr() {
  const d = new Date();
  return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
}

function genId() {
  return 'TSC-' + Math.floor(10000+Math.random()*90000);
}

function calcTotals(items, discountAmt=0) {
  const subtotal = items.reduce((s,i)=>s+i.price*i.qty, 0);
  const cgst = 0;
  const sgst = 0;
  const total = subtotal - discountAmt;
  const grand = Math.round(total);
  const roundOff = grand - total;
  return { subtotal, cgst, sgst, total, grand, roundOff };
}

// ===================== TIMER =====================

  if (state.view === 'tables') {
    document.querySelectorAll('[data-timer]').forEach(el => {
      const tid = parseInt(el.dataset.timer);
      const t = state.tables.find(x=>x.id===tid);
      if (t && t.startTime) {
        const elapsed = Math.floor((Date.now() - t.startTime)/1000);
        el.textContent = fmtTime(elapsed);
      }
    });
  }
}, 1000);

// ===================== RENDER ENGINE =====================
function renderPOSOnly() {
  // Save search cursor position
  const activeId = document.activeElement?.id;
  const cursorPos = document.activeElement?.selectionStart;
  render();
  if (activeId) {
    const el2 = document.getElementById(activeId);
    if (el2) { el2.focus(); if (cursorPos !== undefined) try { el2.setSelectionRange(cursorPos, cursorPos); } catch(e){} }
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const wrapper = el('div', {class:'flex flex-col h-screen overflow-hidden bg-gray-950'}, [
    renderHeader(),
    el('main', {class:'flex flex-1 overflow-hidden'}, [
      state.view === 'tables' ? renderTables() :
      state.view === 'pos'    ? renderPOS()    :
      state.view === 'orders' ? renderOrders() : el('div',{},[])
    ]),
    renderStatusBar()
  ]);

  app.appendChild(wrapper);

  // If bill modal open
  if (state.showBill) {
    app.appendChild(renderBillModal());
  }
}

function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k.startsWith('on') && typeof v==='function') {
      e.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k==='class') {
      e.className = v;
    } else if (k==='checked') {
      e.checked = !!v;
    } else if (k==='value') {
      e.value = v;
    } else if (v !== undefined && v !== null) {
      e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c==null) continue;
    if (typeof c==='string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// ===================== HEADER =====================

  return el('header', {class:'bg-white text-gray-800 flex items-center h-12 px-3 shadow-sm border-b border-gray-200 flex-shrink-0 gap-2'}, [
    el('span', {class:'retro-title text-xl tracking-widest text-blue-600 mr-3'}, ['AJ RETRO']),
    el('nav', {class:'flex items-center gap-1 flex-1'}, tabs.map(tab =>
      el('button', {
        class: `px-4 py-1.5 text-xs font-semibold rounded transition ${
          (state.activeTab===tab.key || (tab.key==='orders' && state.view==='orders'))
          ? 'bg-blue-600 text-white' : 'hover:bg-gray-100 text-gray-700'}`,
        onClick: () => {
          state.activeTab = tab.key;
          if (tab.key==='orders') { state.view='orders'; render(); }
          else if (tab.key==='dine-in') { state.view='tables'; render(); }
          else {
            state.view='pos';
            state.posCtx = { orderType: tab.key, tableNo: tab.key==='take-away'?'Take Away':'Online' };
            state.cartItems=[];
            state.selCat=CATS[0];
            render();
          }
        }
      }, [tab.label])
    )),
    el('span', {class:'text-xs text-gray-500'}, ['TSC Pachore'])
  ]);
}

// ===================== STATUS BAR =====================

  return el('div', {class:'bg-white border-t border-gray-200 text-gray-600 text-xs px-4 py-1 flex items-center justify-between'}, [
    el('span', {class:'retro-title text-blue-600 tracking-wider'}, ['AJ RETRO POS v1.0']),
    el('span', {class:pending>0?'text-orange-500':'text-green-600'}, [
      pending>0 ? `● ${pending} Pending Order(s)` : '● All Orders Clear'
    ]),
    el('span', {}, [new Date().toLocaleString('en-IN')])
  ]);
}

// ===================== TABLE VIEW =====================
function renderTables() {
  return el('div', {class:'flex-1 overflow-y-auto p-4 bg-white'}, [
    el('div', {class:'grid grid-cols-4 gap-4 max-w-5xl mx-auto'}, 
      state.tables.map(t => renderTableCard(t))
    )
  ]);
}

function renderTableCard(t) {
  const elapsed = t.startTime ? Math.floor((Date.now()-t.startTime)/1000) : 0;
  const isOccupied = t.status === 'occupied';
  const isBilled = t.status === 'billed';

  const order = t.orderId ? state.orders.find(o=>o.id===t.orderId) : null;
  const orderTotal = order ? calcTotals(order.items, order.discount||0).grand : 0;

  return el('div', {
    class: `rounded-xl border-2 p-3 cursor-pointer transition-all ${
      isBilled ? 'border-red-300 bg-red-50' :
      isOccupied ? 'border-yellow-300 bg-yellow-50' :
      'border-gray-200 bg-white hover:border-blue-400 shadow-sm'
    }`,
    onClick: () => {
      state.selectedTable = t;
      state.view = 'pos';
      state.posCtx = { orderType:'dine-in', tableNo: t.name };
      // Load existing cart if table is occupied
      if (order) {
        state.cartItems = order.items.map(i => ({...i}));
        state.currentOrder = order;
      } else {
        state.cartItems = [];
        state.currentOrder = null;
      }
      state.selCat = CATS[0];
      state.discount = 0;
      render();
    }
  }, [
    el('div', {class:'flex items-center justify-between mb-1'}, [
      el('span', {class:'retro-title text-lg text-blue-600'}, [t.name]),
      el('button', {
        class:'text-xs text-gray-500 hover:text-red-400 z-10',
        onClick: (e) => {
          e.stopPropagation();
          if(confirm(`Reset ${t.name} to available?`)) {
            state.tables = state.tables.map(x=>x.id===t.id?{...x,status:'available',orderId:null,startTime:null}:x);
            saveState(); render();
          }
        }
      }, ['⟳'])
    ]),
    el('div', {class:'flex justify-center my-2'}, [
      renderTableSvg(t.status)
    ]),
    el('div', {class:'text-center'}, [
      el('div', {class:`text-xs font-semibold ${isBilled?'text-red-600':isOccupied?'text-yellow-600':'text-green-600'}`}, [
        isBilled ? 'BILL PRINTED' : isOccupied ? 'OCCUPIED' : 'AVAILABLE'
      ]),
      isOccupied||isBilled ? el('div', {
        class:'text-xs text-gray-500 mt-0.5 font-mono',
        'data-timer': String(t.id)
      }, [fmtTime(elapsed)]) : el('div',{class:'text-xs text-gray-400 mt-0.5'},['Ready']),
      isOccupied||isBilled ? el('div',{class:'text-xs text-blue-600 font-semibold'},['₹'+orderTotal]) : null
    ])
  ]);
}

function renderTableSvg(status) {
  const color = status==='occupied'?'#b45309': status==='billed'?'#991b1b':'#166534';
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','70'); svg.setAttribute('height','70');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.innerHTML = `
    <rect x="35" y="2" width="30" height="16" rx="4" fill="${color}" opacity="0.7"/>
    <rect x="35" y="82" width="30" height="16" rx="4" fill="${color}" opacity="0.7"/>
    <rect x="2" y="35" width="16" height="30" rx="4" fill="${color}" opacity="0.7"/>
    <rect x="82" y="35" width="16" height="30" rx="4" fill="${color}" opacity="0.7"/>
    <circle cx="50" cy="50" r="28" fill="${color}"/>
    ${status==='billed'?`<text x="50" y="46" text-anchor="middle" fill="white" font-size="8" font-weight="bold">BILL</text>
    <text x="50" y="57" text-anchor="middle" fill="white" font-size="8" font-weight="bold">PRINTED</text>`:''}
  `;
  return svg;
}

      ])
    ])
  ]);
}

function addToCart(item) {
  const existing = state.cartItems.find(c=>c.menuItemId===item.id);
  if (existing) {
    state.cartItems = state.cartItems.map(c=>c.menuItemId===item.id?{...c,qty:c.qty+1}:c);
  } else {
    state.cartItems = [...state.cartItems, {menuItemId:item.id, name:item.name, price:item.price, qty:1}];
  }
  render();
}

function updateQty(menuItemId, qty) {
  if (qty<=0) state.cartItems = state.cartItems.filter(c=>c.menuItemId!==menuItemId);
  else state.cartItems = state.cartItems.map(c=>c.menuItemId===menuItemId?{...c,qty}:c);
  render();
}

function saveKOT() {
  if (state.cartItems.length===0) { alert('Add items first!'); return; }
  const orderId = state.currentOrder ? state.currentOrder.id : genId();
  const order = {
    id: orderId,
    tableNo: state.posCtx.tableNo,
    orderType: state.posCtx.orderType,
    items: [...state.cartItems],
    status: 'pending',
    createdAt: state.currentOrder ? state.currentOrder.createdAt : new Date().toISOString(),
    discount: state.discount||0,
    paymentMode: null,
    custName:'', custPhone:''
  };
  const exists = state.orders.find(o=>o.id===orderId);
  if (exists) state.orders = state.orders.map(o=>o.id===orderId?order:o);
  else state.orders = [...state.orders, order];

  // Update table
  if (state.posCtx.orderType==='dine-in' && state.selectedTable) {
    state.tables = state.tables.map(t=>
      t.id===state.selectedTable.id
      ? {...t, status:'occupied', orderId: order.id, startTime: t.startTime||Date.now()}
      : t
    );
  }
  state.currentOrder = order;
  saveState();
  alert('✅ KOT Saved! Order: ' + orderId);
  render();
}

function openBill() {
  if (state.cartItems.length===0) { alert('Add items first!'); return; }
  // auto-save order first
  saveKOTSilent();
  state.showBill = true;
  state.discount = state.discount||0;
  state.paymentMode = 'Cash';
  state.custName = '';
  state.custPhone = '';
  state.givenAmount = '';
  render();
}

function saveKOTSilent() {
  if (state.cartItems.length===0) return;
  const orderId = state.currentOrder ? state.currentOrder.id : genId();
  const order = {
    id: orderId,
    tableNo: state.posCtx.tableNo,
    orderType: state.posCtx.orderType,
    items: [...state.cartItems],
    status: 'pending',
    createdAt: state.currentOrder ? state.currentOrder.createdAt : new Date().toISOString(),
    discount: state.discount||0,
    paymentMode: null,
    custName:'', custPhone:''
  };
  const exists = state.orders.find(o=>o.id===orderId);
  if (exists) state.orders = state.orders.map(o=>o.id===orderId?order:o);
  else state.orders = [...state.orders, order];
  if (state.posCtx.orderType==='dine-in' && state.selectedTable) {
    state.tables = state.tables.map(t=>
      t.id===state.selectedTable.id
      ? {...t, status:'occupied', orderId: order.id, startTime: t.startTime||Date.now()}
      : t
    );
  }
  state.currentOrder = order;
  saveState();
}

// ===================== BILL MODAL =====================

  // Summary

    el('div',{class:'flex justify-between text-black'},[el('span',{},['Sub-Total:']),el('span',{},['₹'+subtotal.toFixed(2)])]),

  // Payment mode

          el('th',{class:'text-right'},['Amt']),

        discountAmt>0?el('div',{class:'flex justify-between text-green-600'},[el('span',{},['Discount:']),el('span',{},['−₹'+discountAmt.toFixed(2)])]):null,
        el('div',{class:'flex justify-between font-bold border-t border-dashed mt-1 pt-1'},[el('span',{},['GRAND TOTAL:']),el('span',{},['₹'+grandFinal])]),
        el('div',{class:'flex justify-between'},[el('span',{},['Payment:']),el('span',{},[state.paymentMode])]),
      ]),
      el('div',{class:'text-center text-xs text-black mt-2 border-t border-dashed pt-1'},['Thank You! Visit Again 🙏']),
    ]),
    el('div',{class:'mt-2 space-y-1'},[

        type:'text', placeholder:'Customer Name', value:state.custName,

      el('input',{
        type:'text', placeholder:'Customer Phone', value:state.custPhone,
        class:'w-full border border-gray-300 rounded px-2 py-1 text-xs text-black',
        onInput:(e)=>{state.custPhone=e.target.value; renderPOSOnly();}

    el('div',{class:'mt-3 p-2 bg-blue-50 rounded text-xs text-gray-700 border border-blue-200'},[

        el('li',{},[' • Print Margins: None']),

function doPrint() {
  // Add cut command at the end of receipt for thermal printers
  const printArea = document.getElementById('print-area');
  const originalHTML = printArea.innerHTML;
  
  // Add printer cut command (ESC/POS: 0x1D 0x56 0x00)
  const cutCommand = '<div style="margin-top: 10mm; text-align: center; font-size: 8px; color: white;">.</div>';
  printArea.innerHTML += cutCommand;
  
  setTimeout(() => {
    window.print();
    // Restore original content after print
    setTimeout(() => {
      printArea.innerHTML = originalHTML;
    }, 500);
  }, 200);
}

function closeTable() {
  const orderId = state.currentOrder ? state.currentOrder.id : genId();
  const {grand} = calcTotals(state.cartItems, state.discount||0);
  const order = {
    id: orderId,
    tableNo: state.posCtx.tableNo,
    orderType: state.posCtx.orderType,
    items: [...state.cartItems],
    status: 'completed',
    createdAt: state.currentOrder ? state.currentOrder.createdAt : new Date().toISOString(),
    closedAt: new Date().toISOString(),
    discount: state.discount||0,
    paymentMode: state.paymentMode,
    custName: state.custName,
    custPhone: state.custPhone,
    grand: grand
  };
  const exists = state.orders.find(o=>o.id===orderId);
  if (exists) state.orders = state.orders.map(o=>o.id===orderId?order:o);
  else state.orders = [...state.orders, order];

  // Free the table
  if (state.posCtx.orderType==='dine-in' && state.selectedTable) {
    state.tables = state.tables.map(t=>
      t.id===state.selectedTable.id
      ? {...t, status:'available', orderId:null, startTime:null}
      : t
    );
  }
  saveState();
  state.showBill = false;
  state.cartItems = [];
  state.currentOrder = null;
  state.selectedTable = null;
  state.view = state.posCtx.orderType==='dine-in' ? 'tables' : 'orders';
  render();
  alert('✅ Order Completed! Payment: '+state.paymentMode);
}

// ===================== ORDERS VIEW =====================

    el('div',{class:'flex items-center justify-between mb-3'},[
      el('h2',{class:'retro-title text-xl text-blue-600'},['ALL ORDERS']),
      el('button',{
        class:'text-xs bg-gray-300 hover:bg-gray-400 text-gray-800 px-3 py-1.5 rounded',
        onClick:()=>{
          if(confirm('Clear all completed orders from list?')) {
            state.orders=state.orders.filter(o=>o.status!=='completed');
            saveState(); render();
          }
        }
      },['🗑️ Clear Completed'])
    ]),
    sorted.length===0
    ? el('div',{class:'text-center text-gray-600 py-20'},['No orders yet'])

        el('table',{class:'w-full text-xs bg-white rounded-lg overflow-hidden'},[

              el('th',{class:'px-3 py-2 text-left'},['Order ID']),
              el('th',{class:'px-3 py-2 text-left'},['Table']),

              el('th',{class:'px-3 py-2 text-left'},['Status']),

              el('td',{class:'px-3 py-2'},[
                el('span',{class:`px-2 py-0.5 rounded text-xs font-medium ${o.status==='completed'?'bg-green-100 text-green-800':'bg-yellow-100 text-yellow-800'}`},[o.status])

              el('td',{class:'px-3 py-2 text-right text-gray-800 font-bold'},['₹'+grand]),
              el('td',{class:'px-3 py-2 text-gray-700'},[o.paymentMode||'--']),
              el('td',{class:'px-3 py-2 text-gray-700'},[o.custName||'--']),
            ]);
          }))
        ])
      ])
  ]);
}

render();
</script>
